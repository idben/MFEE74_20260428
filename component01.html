<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand: #fd0da5;
      --color-brand-100: #F272C3;
      --color-brand-500: #fd0da5;
      --color-brand-900: #90095E;
      --color-danger: #c40f21;
      --font-sans: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      --font-brand: "Roboto", "Helvetica Neue", sans-serif;
      --font-mono: ui-monospace, Menlo, monospace;
      --font-myfont1: "WDXL Lubrifont JP N", sans-serif;
      --spacing-card-x: 24px;
      --spacing-card-y: 12px;
      --breakpoint-p500: 500px;
      --breakpoint-p1000: 1000px;
      --breakpoint-p1500: 1500px;
      --breakpoint-p2000: 2000px;
    }
    @layer base{
      h1{
        @apply text-4xl font-extrabold py-card-x;
      }
    }
    @layer components{
      .btn{
        @apply px-4 py-2 rounded font-medium select-none cursor-pointer;
      }
      .btn-blue{
        @apply bg-blue-500 text-white hover:bg-blue-600;
      }
      .btn-gray{
        @apply bg-gray-500 text-white hover:bg-gray-600;
      }
      .btn-red{
        @apply bg-red-500 text-white hover:bg-red-600;
      }
    }

    @layer utilities{
      .bg-ben-500{
        background-color: #32b609;
      }
    }
  </style>
  <title>封裝(組件)</title>
</head>
<body>
  <div class="container mx-auto py-4">
    <h1>封裝(組件)</h1>
    <div class="orl mb-2">
      <button class="px-4 py-2 rounded font-medium select-none cursor-pointer bg-blue-500 text-white hover:bg-blue-600">按鈕</button>
      <button class="px-4 py-2 rounded font-medium select-none cursor-pointer bg-gray-500 text-white hover:bg-gray-600">按鈕</button>
      <button class="px-4 py-2 rounded font-medium select-none cursor-pointer bg-red-500 text-white hover:bg-red-600">按鈕</button>
    </div>
    <div>
      <button class="btn btn-blue bg-amber-500">新按鈕</button>
      <button class="btn btn-gray bg-ben-500">新按鈕</button>
      <button class="btn btn-red bg-brand">新按鈕</button>
      <div class="text-brand-500/10 text-6xl font-sans">TEST</div>
      <div class="text-brand-500/30 text-6xl font-brand">TEST</div>
      <div class="text-brand-500/50 text-6xl font-mono">TESTtest</div>
      <div class="text-brand-500/80 text-6xl font-myfont1">TEST 測試</div>
      <div class="text-danger/50 text-6xl">TEST2</div>
    </div>
    <div class="card bg-indigo-400 px-card-x py-card-y">
      123
    </div>

  </div>
  <div class="mt-4 h-25 bg-amber-100 p500:bg-amber-300 p1000:bg-amber-500 p1500:bg-amber-700 p2000:bg-amber-900"></div>
</body>
</html>
