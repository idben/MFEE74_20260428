<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/button.css">
  <title>自訂組件: 按鈕</title>
</head>
<body>
  <div class="container mx-auto py-4">
    <button class="btn btn-primary">主要的</button>
    <button class="btn btn-primary" disabled>主要的禁用</button>
    <button class="btn btn-secondary">次要的</button>
    <button class="btn btn-secondary" disabled>次要的禁用</button>
    <button class="btn btn-danger">危險的</button>
    <button class="btn btn-danger" disabled>危險的禁用</button>
  </div>
</body>
</html>
