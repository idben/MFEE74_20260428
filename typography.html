<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/typography.css">
  <title>原生元素</title>
</head>
<body class="bg-amber-100">
  <div class="container mx-auto p-4 m-4 bg-white">
    <article class="prose mb-5">
      <h1>文章標題 H1</h1>
      <h2>子標題 H2</h2>
      <p>這是一大段內文，會有比較寬鬆的行距，方便閱讀。再多打幾個字就會發現和原生段落差很多。</p>
      <p>第二段文字，前後會自動有間距。</p>
      <ul>
        <li>列表項目一</li>
        <li>列表項目二</li>
      </ul>
      <blockquote>這是引言，會加左邊灰線。</blockquote>
    </article>
    <article class="prose mb-4 prose-lg">
      <h1>文章標題 H1</h1>
      <h2>子標題 H2</h2>

      <p>第二段文字，前後會自動有間距。</p>
      <ul>
        <li>列表項目一</li>
        <li>列表項目二</li>
      </ul>
      <blockquote>這是引言，會加左邊灰線。</blockquote>
    </article>
  </div>
</body>
</html>
