<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    @theme{
      --color-primary: #0d6efd;
      --color-primary-border: #0C5ED9;  
      --color-primary-dark: #4E91F6;
      --color-secondary: #6c757d;
      --color-secondary-dark: #5c636a;
      --color-danger: #dc3545;
      --color-danger-dark: #bb2d3b;
    }
    @layer components{
      .btn{
        @apply px-4 py-2 rounded-md font-normal select-none cursor-pointer inline-block;
        &:hover{
          @apply text-lg font-bold;
        }
        &:disabled{
          @apply bg-gray-300 text-gray-500 cursor-not-allowed hover:bg-gray-300;
        }
      }
      .btn-primary {
        @apply bg-primary text-white hover:bg-primary-dark border-[2px] border-primary-border;
        &:focus{
          @apply outline-blue-950
        }
        &:disabled {
          @apply bg-sky-200 text-sky-400 hover:bg-sky-200;
        }
      }
    }
  </style>
  <title>Dark Mode</title>
</head>
<body class="flow-root">
  <div class="container mx-auto p-4 m-4">
    <div class="w-50 h-30 rounded grid place-items-center bg-rose-400 text-black text-3xl dark:bg-black dark:text-white">內容</div>
    <button class="btn btn-primary dark:bg-blue-800 drak:border-blue-900">切換</button>
  </div>

  <script>
    const html = document.documentElement;
    const key = "theme";
    const saved = localStorage.getItem(key);
    if(saved) html.classList.toggle("dark", saved === "dark");
  </script>
</body>
</html>
