<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/form2.css">
  <title>表單元素</title>
</head>
<body class="bg-stone-200">
  <div class="container mx-auto p-4 m-4 bg-white rounded">
    <div class="w-full min-h-10 p-3 rounded-md bg-gray-100 mb-3">
      <label class="block">
        <span class="text-gray-700">名字</span>
        <input type="text" class="mt-1 block w-full form-input" placeholder="" />
      </label>
      <label class="block">
        <span class="text-gray-700">信箱</span>
        <input type="email" class="mt-1 block w-full form-input" placeholder="john@example.com" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動時間</span>
        <input type="date" class="mt-1 block w-full form-input" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動類型</span>
        <select class="block w-full mt-1 form-select">
          <option>工作</option>
          <option>婚禮</option>
          <option>生日</option>
          <option>其他</option>
        </select>
      </label>
      <label class="block">
        <span class="text-gray-700">活動細節</span>
        <textarea class="mt-1 block w-full form-textarea" rows="3"></textarea>
      </label>
      <label class="inline-flex items-center mt-2">
        <input type="checkbox" checked class="form-checkbox"  />
        <span class="ml-2">當有特殊價格時通知我</span>
      </label>
    </div>

    <div class="w-full min-h-10 p-3 rounded-md bg-gray-100 mb-3">
      <label class="block">
        <span class="text-gray-700">名字</span>
        <input type="text" class="mt-1 block w-full input1" placeholder="" />
      </label>
      <label class="block">
        <span class="text-gray-700">信箱</span>
        <input type="email" class="mt-1 block w-full input1" placeholder="john@example.com" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動時間</span>
        <input type="date" class="mt-1 block w-full input1" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動類型</span>
        <select class="block w-full mt-1 select1">
          <option>工作</option>
          <option>婚禮</option>
          <option>生日</option>
          <option>其他</option>
        </select>
      </label>
      <label class="block">
        <span class="text-gray-700">活動細節</span>
        <textarea class="mt-1 block w-full textarea1" rows="3"></textarea>
      </label>
      <label class="inline-flex items-center mt-2">
        <input type="checkbox" checked class="checkbox1"  />
        <span class="ml-2">當有特殊價格時通知我</span>
      </label>
    </div>

    <div class="w-full min-h-10 p-3 rounded-md bg-gray-100 mb-3">
      <label class="block">
        <span class="text-gray-700">名字</span>
        <input type="text" class="mt-1 block w-full input2" placeholder="" />
      </label>
      <label class="block">
        <span class="text-gray-700">信箱</span>
        <input type="email" class="mt-1 block w-full input2" placeholder="john@example.com" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動時間</span>
        <input type="date" class="mt-1 block w-full input2" />
      </label>
      <label class="block">
        <span class="text-gray-700">活動類型</span>
        <select class="block w-full mt-1 select2">
          <option>工作</option>
          <option>婚禮</option>
          <option>生日</option>
          <option>其他</option>
        </select>
      </label>
      <label class="block">
        <span class="text-gray-700">活動細節</span>
        <textarea class="mt-1 block w-full textarea2" rows="3"></textarea>
      </label>
      <label class="inline-flex items-center mt-2">
        <input type="checkbox" checked class="checkbox2"  />
        <span class="ml-2">當有特殊價格時通知我</span>
      </label>
    </div>
  </div>
</body>
</html>
